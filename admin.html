<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Broadcast Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.125);
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ff0055;
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.05), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1,
        h2,
        h3 {
            font-family: 'Space Grotesk', sans-serif;
            text-transform: uppercase;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* --- LOGIN SECTION --- */
        #login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        #login-section h1 {
            color: var(--accent);
            margin-bottom: 10px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 5px 15px rgba(255, 0, 85, 0.4);
        }

        /* --- DASHBOARD SECTION --- */
        #dashboard-section {
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
        }

        .header h1 {
            color: var(--accent);
        }

        .logout-btn {
            width: auto;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .card h2 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .list-item p {
            font-size: 0.9rem;
        }

        .delete-btn {
            width: auto;
            padding: 5px 10px;
            font-size: 0.8rem;
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .delete-btn:hover {
            background: var(--danger);
        }

        .flex-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .flex-row input {
            flex-grow: 1;
            margin-bottom: 0;
        }

        .flex-row button {
            width: auto;
            padding: 0 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LOGIN -->
        <div id="login-section">
            <h1>Acceso Admin</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Ingresa para controlar el Broadcast</p>

            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="admin" value="admin">
            </div>

            <button onclick="login()">Entrar al Panel</button>
            <p id="login-error" style="color: var(--danger); display: none; margin-top: 10px; font-size: 0.9rem;">
                Credenciales incorrectas.</p>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard-section">
            <div class="header">
                <h1>Command Center Panel</h1>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </div>

            <div class="grid">

                <!-- MEDIA PLAYER CONTROL -->
                <div class="card">
                    <h2>📺 Control de Media (YouTube/Spotify)</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">Pega el ID del video o
                        playlist.</p>
                    <div class="form-group">
                        <label>ID de YouTube (Ej: jfKfPfyJRdk)</label>
                        <div class="flex-row">
                            <input type="text" id="media-id" placeholder="ID del video...">
                            <button onclick="updateMedia()">Actualizar</button>
                        </div>
                    </div>
                </div>

                <!-- BIRTHDAY CONTROL -->
                <div class="card">
                    <h2>🎉 Cumpleañero del Día</h2>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 15px;">Enlaza excel o escribe
                        manualmente.</p>
                    <div class="form-group">
                        <label>Nombre y Foto (Ej: Carlos, Diseño)</label>
                        <div class="flex-row">
                            <input type="text" id="bday-name" placeholder="Nombre...">
                            <button onclick="updateBirthday()">Actualizar</button>
                        </div>
                        <button class="logout-btn"
                            style="width: 100%; border-color: rgba(255,255,255,0.2); color: var(--text-muted);"
                            onclick="fetchSharepoint()">🔗 Sincronizar Excel de SharePoint</button>
                    </div>
                </div>

                <!-- TICKER CONTROL -->
                <div class="card">
                    <h2>📰 Mensajes Ticker</h2>
                    <div class="flex-row">
                        <input type="text" id="new-ticker" placeholder="Ej: URGENTE: Revisar...">
                        <button onclick="addTicker()">Añadir</button>
                    </div>
                    <div id="ticker-list">
                        <!-- Items se inyectan acá -->
                    </div>
                </div>

                <!-- REMINDERS CONTROL -->
                <div class="card" style="grid-column: 1 / -1;">
                    <h2>⏰ Recordatorios y Deadlines</h2>
                    <div class="flex-row">
                        <input type="text" id="rem-title" placeholder="Título del Recordatorio...">
                        <input type="text" id="rem-time" placeholder="Hora / Edo (Ej: Hoy - 17:00)">
                        <button onclick="addReminder()">Añadir</button>
                    </div>
                    <div id="reminder-list" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <!-- Items se inyectan acá -->
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // --- LOGIC ---

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Credenciales de prueba
            if (user === 'admin' && pass === 'admin') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard-section').style.display = 'block';
                renderLists();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('dashboard-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        // --- MOCK DATA PARA PROTOTIPO ---
        let tickers = [
            "ACTUALIZACIÓN: El nuevo portal interno ya está en vivo a partir de hoy.",
            "RECORDATORIO: Enviar reportes de gastos."
        ];

        let reminders = [
            { title: "Cierre de Reportes Q3", time: "Hoy - 17:00 PM" },
            { title: "Revisión de Presupuesto", time: "Mañana - 09:00 AM" }
        ];

        function renderLists() {
            // Render Tickers
            const tickerList = document.getElementById('ticker-list');
            tickerList.innerHTML = '';
            tickers.forEach((t, index) => {
                tickerList.innerHTML += `
                    <div class="list-item">
                        <p>${t}</p>
                        <button class="delete-btn" onclick="deleteTicker(${index})">Eliminar</button>
                    </div>
                `;
            });

            // Render Reminders
            const remList = document.getElementById('reminder-list');
            remList.innerHTML = '';
            reminders.forEach((r, index) => {
                remList.innerHTML += `
                    <div class="list-item">
                        <div>
                            <p style="font-weight: 600; color: var(--accent);">${r.title}</p>
                            <p style="color: var(--text-muted); font-size: 0.8rem;">${r.time}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteReminder(${index})">Eliminar</button>
                    </div>
                `;
            });
        }

        function addTicker() {
            const val = document.getElementById('new-ticker').value;
            if (val) {
                tickers.push(val);
                document.getElementById('new-ticker').value = '';
                renderLists();
                // Aquí en el futuro enviaríamos a Firebase
            }
        }

        function deleteTicker(index) {
            tickers.splice(index, 1);
            renderLists();
        }

        function addReminder() {
            const title = document.getElementById('rem-title').value;
            const time = document.getElementById('rem-time').value;
            if (title && time) {
                reminders.push({ title, time });
                document.getElementById('rem-title').value = '';
                document.getElementById('rem-time').value = '';
                renderLists();
            }
        }

        function deleteReminder(index) {
            reminders.splice(index, 1);
            renderLists();
        }

        function updateMedia() {
            const id = document.getElementById('media-id').value;
            if (id) {
                alert('Media ID actualizado a: ' + id + '\n\nEn un entorno real, esto enviaría el ID a la base de datos (Firebase) y la pantalla del Broadcast se actualizaría sola al instante.');
            }
        }

        function updateBirthday() {
            const name = document.getElementById('bday-name').value;
            if (name) {
                alert('Cumpleañero actualizado a: ' + name);
            }
        }

        function fetchSharepoint() {
            alert('Atención: Para extraer la lista de cumpleaños desde el enlace de SharePoint (Excel) necesitaremos usar la "Microsoft Graph API" (requiere que la empresa nos dé permisos OAuth) o bien exportar el Excel y cargarlo. \n\nPor ahora es un panel manual, ¡pero en la estructura final de Firebase esta función leerá el Excel automáticamente!');
        }

    </script>
</body>

</html>
