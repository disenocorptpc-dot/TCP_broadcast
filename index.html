<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(17, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.125);
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ff0055;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.05), transparent 25%);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 450px;
            grid-template-rows: 1fr 70px;
            overflow: hidden;
        }

        /* --- MAIN VIDEO AREA --- */
        .main-content {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-badge {
            background-color: var(--danger);
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        .video-container {
            flex-grow: 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), 0 0 0 1px var(--glass-border);
            position: relative;
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- SIDEBAR DASHBOARD --- */
        .sidebar {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-left: 1px solid var(--glass-border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .widget {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .widget:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2), 0 0 15px var(--accent-glow);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .widget h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Stats Widget */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .stat-box .value {
            font-size: 2.8rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-box .label {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        /* Tasks Widget */
        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .task-item:last-child {
            margin: 0;
            padding: 0;
            border: none;
        }

        .status-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .status-dot.pending {
            background: #ffaa00;
        }

        .status-dot.urgent {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        .status-dot.done {
            background: #00ff88;
        }

        /* --- BOTTOM TICKER --- */
        .ticker-bar {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            background: #050810;
            border-top: 1px solid var(--accent);
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 -5px 20px rgba(0, 240, 255, 0.1);
        }

        .ticker-label {
            background: var(--accent);
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            padding: 0 30px;
            height: 100%;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .ticker-content {
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }

        .ticker-text {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
            font-size: 1.8rem;
            font-weight: 400;
        }

        .ticker-text span {
            margin-right: 50px;
        }

        .ticker-text .highlight {
            color: var(--accent);
            font-weight: 600;
        }

        .ticker-text .alert {
            color: var(--danger);
            font-weight: 600;
        }

        /* Animations */
        @keyframes ticker {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-100%, 0, 0);
            }
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        /* Clock Widget */
        #clock {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <!-- Main View Area -->
    <main class="main-content">
        <header class="header">
            <h1><span class="live-badge">LIVE</span> Company Broadcast</h1>
            <div style="color: var(--text-muted);">Q3 Global Kickoff</div>
        </header>

        <div class="video-container">
            <iframe id="main-video"
                src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&controls=0&loop=1&playlist=jfKfPfyJRdk"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen></iframe>
        </div>
    </main>

    <!-- Sidebar Dashboard -->
    <aside class="sidebar">
        <div class="widget">
            <h3>Hora Local</h3>
            <div id="clock">12:00:00</div>
        </div>

        <div class="widget">
            <h3>🎉 Cumpleaños</h3>
            <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                <div style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase;">Hoy celebramos a:
                </div>
                <div id="bday-main" style="font-size: 1.8rem; font-weight: 700; color: #ffaa00; margin-top: 4px;">🎂
                    Cargando...</div>
                <div id="bday-dept" style="font-size: 1.1rem; color: var(--text-main); margin-top: 2px;"></div>
            </div>
            <div>
                <div style="font-size: 1rem; color: var(--text-muted); text-transform: uppercase;">Próximos:</div>
                <ul class="task-list" id="bday-next-list" style="margin-top: 8px;">
                    <!-- Se inyecta desde FB -->
                </ul>
            </div>
        </div>

        <div class="widget">
            <h3>🔇 En Junta / Ocupados</h3>
            <ul class="task-list" id="busy-list">
                <!-- Se inyecta desde DB -->
            </ul>
        </div>

        <div class="widget">
            <h3>Métricas de Evento</h3>
            <div class="stat-grid">
                <div class="stat-box">
                    <div class="value">1,204</div>
                    <div class="label">Viendo ahora</div>
                </div>
                <div class="stat-box">
                    <div class="value" style="color: #00ff88;">98%</div>
                    <div class="label">Estabilidad</div>
                </div>
            </div>
        </div>

        <div class="widget">
            <h3>Próximos Deadlines</h3>
            <ul class="task-list" id="deadline-list">
                <!-- Se inyecta desde DB -->
            </ul>
        </div>
    </aside>

    <!-- Bottom Ticker -->
    <div class="ticker-bar">
        <div class="ticker-label">BREAKING</div>
        <div class="ticker-content">
            <div class="ticker-text" id="ticker-text">
                <!-- Cargando... -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initFirebase } from './firebase-config.js';
        import { onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Simple clock functionality
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        let currentVideoId = "";

        // Inicializar Firebase
        initFirebase().then(({ docRef }) => {
            console.log("Firebase Conectado. Escuchando cambios en vivo...");

            onSnapshot(docRef, (doc) => {
                if (doc.exists()) {
                    const data = doc.data();

                    // Actualizar Ticker
                    if (data.tickers && document.getElementById('ticker-text')) {
                        let innerHtml = '';
                        data.tickers.forEach(t => {
                            if (t.includes('URGENTE') || t.includes('RECORDATORIO')) {
                                innerHtml += `<span><span class="alert">ATENCIÓN:</span> ${t}</span>`;
                            } else {
                                innerHtml += `<span><span class="highlight">INFO:</span> ${t}</span>`;
                            }
                        });
                        if (innerHtml === '') innerHtml = '<span>Sin anuncios actuales.</span>';
                        document.getElementById('ticker-text').innerHTML = innerHtml;
                    }

                    // Actualizar Cumpleaños
                    if (data.birthday) {
                        document.getElementById('bday-main').innerHTML = `🎂 ${data.birthday.name || '--'}`;
                        document.getElementById('bday-dept').innerHTML = data.birthday.dept || '--';
                    }

                    // Actualizar Personal En Junta
                    if (data.busy) {
                        const busyList = document.getElementById('busy-list');
                        busyList.innerHTML = '';
                        data.busy.forEach(b => {
                            busyList.innerHTML += `
                                <li class="task-item">
                                    <span class="status-dot urgent"></span>
                                    <div>
                                        <div style="font-weight: 600; font-size: 1.2rem;">${b.name}</div>
                                        <div style="font-size: 0.9rem; color: var(--text-muted);">${b.reason || 'Ocupado'}</div>
                                    </div>
                                </li>`;
                        });
                    }

                    // Actualizar Deadlines
                    if (data.reminders) {
                        const list = document.getElementById('deadline-list');
                        list.innerHTML = '';
                        data.reminders.forEach(r => {
                            let statusClass = "pending";
                            if (r.time.toLowerCase().includes('hoy')) statusClass = "urgent";
                            if (r.time.toLowerCase().includes('completado')) statusClass = "done";

                            list.innerHTML += `
                                <li class="task-item">
                                    <span class="status-dot ${statusClass}"></span>
                                    <div>
                                        <div style="font-weight: 600; font-size: 1.2rem;">${r.title}</div>
                                        <div style="font-size: 0.9rem; color: var(--text-muted);">${r.time}</div>
                                    </div>
                                </li>`;
                        });
                    }

                    // Actualizar Media Playlist
                    if (data.mediaIds && data.mediaIds.length > 0) {
                        let newPlayListStr = data.mediaIds.join(",");
                        if (newPlayListStr !== currentVideoId) {
                            currentVideoId = newPlayListStr;
                            const iframe = document.getElementById('main-video');

                            let firstId = data.mediaIds[0];
                            let othersParams = data.mediaIds.length > 1 ? `&playlist=${data.mediaIds.slice(1).join(',')}` : `&playlist=${firstId}`;

                            iframe.src = `https://www.youtube.com/embed/${firstId}?autoplay=1&mute=1&controls=0&loop=1${othersParams}`;
                        }
                    }

                }
            });
        }).catch(err => {
            console.error("Error conectando a Firebase: ", err);
        });

    </script>
</body>

</html>
